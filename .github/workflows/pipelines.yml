name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main  # Asegúrate de que tu rama se llame main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          # Nombre exacto de tu secreto en GitHub
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_SAND_09D6DB80F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          
          ###### CONFIGURACIÓN CRÍTICA PARA POKEDEX ######
          app_location: "/"       # Donde está tu index.html
          api_location: ""        # Sin funciones API
          output_location: "/"    # SE CORRIGE A "/" PARA QUE ENCUENTRE EL INDEX EN LA RAÍZ
          ###### ###### ###### ###### ###### ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ASHY_SAND_09D6DB80F }}
          action: "close"
