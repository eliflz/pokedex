name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main  # Asegúrate de que este sea el nombre de tu rama principal

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_... }} # Azure debe haber creado este secreto automáticamente
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          [cite_start]app_location: "/" # Ubicación del código fuente 
          api_location: "" 
          output_location: "" # Vacío para HTML puro
